<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REALITY — Spacing &amp; Layout · options</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;500;600;700;800&family=Montserrat+Alternates:wght@600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link href="reality-ds.css" rel="stylesheet">
<style>
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="spacing/phone-screen.jsx"></script>
<script type="text/babel" src="spacing/spacing-docs.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

// The three spatial systems — same content, only spacing tokens differ.
const TIGHT = { screen: 16, gap: 12, cardPad: 14, rowY: 10, btnH: 48, headPad: 12 };
const COMF  = { screen: 20, gap: 16, cardPad: 20, rowY: 12, btnH: 48, headPad: 16 };
const GEN   = { screen: 32, gap: 32, cardPad: 30, rowY: 22, btnH: 56, headPad: 26 };

const PHONE_W = 312, PHONE_H = 660;

function Frame({ children }) {
  // thin device shell so the screen reads as a phone, on-brand hard corners
  return (
    <div style={{ width: PHONE_W, height: PHONE_H, border: '2px solid var(--fg)', boxShadow: 'var(--sh-default)', background: 'var(--bg)', overflow: 'hidden' }}>
      {children}
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="density" title="01 · Spacing — pick a density" subtitle="Same live-room screen, three spatial systems. Only the spacing tokens change.">
        <DCArtboard id="tight" label="A · Tight (data-dense)" width={PHONE_W} height={PHONE_H}>
          <Frame><PhoneScreen s={TIGHT} /></Frame>
        </DCArtboard>
        <DCArtboard id="comf" label="B · Comfortable ✦ recommended" width={PHONE_W} height={PHONE_H}>
          <Frame><PhoneScreen s={COMF} /></Frame>
        </DCArtboard>
        <DCArtboard id="gen" label="C · Print-generous" width={PHONE_W} height={PHONE_H}>
          <Frame><PhoneScreen s={GEN} /></Frame>
        </DCArtboard>
      </DCSection>

      <DCSection id="spec" title="02 · The scale & grid" subtitle="What gets locked once a density is chosen.">
        <DCArtboard id="ramp" label="Spacing scale · 4px base" width={460} height={520}>
          <div style={{ background: 'var(--bg)', border: '2px solid var(--fg)', boxShadow: 'var(--sh-default)', padding: 28, height: '100%', boxSizing: 'border-box', overflow: 'hidden' }}>
            <ScaleRamp />
          </div>
        </DCArtboard>
        <DCArtboard id="grid" label="App grid & touch targets" width={440} height={520}>
          <div style={{ background: 'var(--bg)', border: '2px solid var(--fg)', boxShadow: 'var(--sh-default)', padding: 28, height: '100%', boxSizing: 'border-box', overflow: 'hidden' }}>
            <GridSpec />
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
